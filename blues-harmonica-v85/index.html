        ctx.stroke(); ctx.lineWidth=1;
      }
      getAnchors(state.project).forEach(a => { const x = (a.timeSec/endT(state.project))*w; ctx.fillStyle='rgba(236,72,153,0.6)'; ctx.fillRect(x-1, 0, 2, h); });
      const cx = (curT()/endT(state.project))*w; ctx.fillStyle='#10b981'; ctx.fillRect(cx-1, 0, 2, h); ctx.restore();
    }

    function tick(ts) {
      if(!state.lastDrawTs) state.lastDrawTs=ts; const dt = (ts-state.lastDrawTs)/1000; state.lastDrawTs=ts;
      if(state.playingWithoutAudio) {
        state.previewClock += dt;
        if(state.previewClock>=endT(state.project)) { state.previewClock=endT(state.project); pause(); } syncUI();
      }
      draw(); renderWaveform(); state.raf = requestAnimationFrame(tick);
    }

        els.miniExportWidget.classList.add('hidden');
    };
    
    els.exportMinimizeBtn.onclick = () => {
        els.exportModal.classList.add('hidden');
        if (window._exportState.active) els.miniExportWidget.classList.remove('hidden');
    };
    
    els.miniExportWidget.onclick = () => {
        els.miniExportWidget.classList.add('hidden');
        els.exportModal.classList.remove('hidden');
    };

    els.expSetFullRangeBtn.onclick = () => { els.expStart.value = 0; els.expEnd.value = endT(state.project).toFixed(1); };

    els.expStartBtn.onclick = async () => {
        if(window._exportState.active) return;
        
        const renderMode = els.expRenderMode.value;
        const isRealtime = renderMode.startsWith('realtime_');

        try {
            window._exportState = { active: true, paused: false, canceled: false, renderTimer: null, mediaRecorder: null, isRealtime: false, realtimeCanvas: null, realtimeCtx: null };
            toggleRenderUI(true);
            
            els.expTitleIng.innerText = isRealtime ? '🔴 正在执行实时录制与混流' : '🚀 正在执行离线超音速极速渲染';
            
            const startSec = Math.max(0, parseFloat(els.expStart.value) || 0);
            const endSec = Math.max(startSec + 0.1, parseFloat(els.expEnd.value) || 30);
            const snapP = JSON.parse(JSON.stringify(state.project));
            
            let exportW = clampNum(els.expWidth.value, 640, 3840, 1080);
            let exportH = clampNum(els.expHeight.value, 360, 3840, 1920);
            exportW = exportW % 2 === 0 ? exportW : exportW - 1;
            exportH = exportH % 2 === 0 ? exportH : exportH - 1;

            if (isRealtime) {
                els.expPauseResumeBtn.style.display = 'none'; 
                els.expCancelBtn.innerText = '⏹ 中止录制';
                els.expProgressBar.style.width = '0%';
                
                pause(); 
                setT(startSec); 
                
                window._exportState.isRealtime = true;
                const exportCanvas = document.createElement('canvas');
                exportCanvas.width = exportW;
                exportCanvas.height = exportH;
                window._exportState.realtimeCanvas = exportCanvas;
                window._exportState.realtimeCtx = exportCanvas.getContext('2d');
                
                const videoStream = exportCanvas.captureStream(60);
                const stream = new MediaStream([videoStream.getVideoTracks()[0]]);
                
                let hasAudio = false;
                try {
                    const el = els.audioEl;
                    if (el.src) {
                        el.currentTime = startSec;
                        let audioStream = null;
                        if (el.captureStream) audioStream = el.captureStream();
                        else if (el.mozCaptureStream) audioStream = el.mozCaptureStream();
                        
                        if (audioStream && audioStream.getAudioTracks().length > 0) {
                            stream.addTrack(audioStream.getAudioTracks()[0]);
                            hasAudio = true;
                        }
                    }
                } catch(e) { console.warn("Audio Capture Warning:", e); }
                
                if (!hasAudio) showExportAlert("⚠️ 提示: 未检测到伴奏或已加载的合成轨，本次将导出无声视频。", "warn");

                let mimeType = 'video/mp4';
                let fileExt = 'mp4';
                
                if (!MediaRecorder.isTypeSupported(mimeType)) {
                    mimeType = 'video/webm; codecs=h264';
                    fileExt = 'webm';
                    if (!MediaRecorder.isTypeSupported(mimeType)) {
                        mimeType = 'video/webm';
                    }
                    console.warn(`浏览器不支持原生录制 ${renderMode}，已降级为: ${mimeType}`);
                }

                const recorder = new MediaRecorder(stream, { 
                    mimeType: mimeType,
                    videoBitsPerSecond: 8000000 
                });
                
                const chunks = [];
                recorder.ondataavailable = e => { if (e.data.size > 0) chunks.push(e.data); };
                
                recorder.onstop = () => {
                    window._exportState.isRealtime = false;
                    window._exportState.realtimeCanvas = null;
                    window._exportState.realtimeCtx = null;
                    
                    if (window._exportState.canceled) {
                        showExportAlert("❌ 录制任务已被您中止。", "error");
                        return;
                    }
                    const blob = new Blob(chunks, { type: mimeType });
                    const url = URL.createObjectURL(blob);
                    const a = document.createElement('a'); a.href = url;
                    a.download = `${String(snapP.title || 'export').replace(/[^a-z0-9_\-]+/gi, '_')}_高质量实时混流.${fileExt}`; 
                    a.click(); setTimeout(() => URL.revokeObjectURL(url), 2000);
                    
                    showExportAlert(`✅ 录像合流完成！已使用 ${mimeType} 高保真编码，并触发下载。`, 'success');
                    els.expCancelBtn.innerText = '完成并关闭';
                    window._exportState.active = false;
                    els.miniExportWidget.classList.add('hidden');
                    pause();
                };

                window._exportState.mediaRecorder = recorder;
                recorder.start();
                play(); 
                
                window._exportState.renderTimer = setInterval(() => {
                    if (window._exportState.canceled) {
                        clearInterval(window._exportState.renderTimer);
                        if(recorder.state !== 'inactive') recorder.stop();
                        pause(); return;
                    }
                    const current = curT();
                    const p = (current - startSec) / (endSec - startSec);
                    
                    if (current >= endSec || p >= 1.0 || !state.isPlaying) {
                        clearInterval(window._exportState.renderTimer);
                        els.expProgressBar.style.width = '100%';
                        els.expProgressText.innerText = "录制完成，正在打包文件，请稍候...";
                        els.miniProgressText.innerText = "打包中...";
                        if(recorder.state !== 'inactive') recorder.stop();
                        pause();
                    } else {
                        els.expProgressBar.style.width = `${p * 100}%`;
                        const txt = `录制中: ${(current-startSec).toFixed(1)}s / ${(endSec-startSec).toFixed(1)}s`;
                        els.expProgressText.innerText = txt;
                        els.miniProgressText.innerText = txt;
                    }
                }, 100);

            } else {
                const isMp4 = renderMode === 'webcodecs_mp4';
                if (isMp4 && typeof window.Mp4Muxer === 'undefined') throw new Error("MP4 核心库未加载，请刷新页面重试。");
                if (!isMp4 && typeof window.WebMMuxer === 'undefined') throw new Error("WebM 核心库未加载，请刷新页面重试。");

                const snapS = { ...state.skin }; 
                
                els.expProgressBar.style.width = '0%';
                const initText = `0% ( 0.0s / ${(endSec - startSec).toFixed(1)}s )`;
                els.expProgressText.innerText = initText;
                els.miniProgressText.innerText = initText;
                
                els.expPauseResumeBtn.style.display = 'inline-flex';
                els.expPauseResumeBtn.innerText = '⏸ 暂停渲染';
                els.expCancelBtn.innerText = '⏹ 彻底放弃任务';
                
                const canvas = new OffscreenCanvas(exportW, exportH);
                const ctx = canvas.getContext('2d', { willReadFrequently: true }); 
                
                const fps = 60; 
                const totalFrames = Math.ceil((endSec - startSec) * fps);

                let muxer;
                if (isMp4) {
                    muxer = new window.Mp4Muxer.Muxer({
                        target: new window.Mp4Muxer.ArrayBufferTarget(),
                        video: { codec: 'avc', width: exportW, height: exportH },
                        fastStart: 'in-memory'
                    });
                } else {
                    muxer = new window.WebMMuxer.Muxer({
                        target: new window.WebMMuxer.ArrayBufferTarget(),
                        video: { codec: 'V_VP9', width: exportW, height: exportH }
                    });
                }

                const config = {
                    codec: isMp4 ? 'avc1.640032' : 'vp09.00.41.08',
                    width: exportW, height: exportH,
                    bitrate: 8_000_000,
                    framerate: fps
                };

                const support = await VideoEncoder.isConfigSupported(config);
                if (!support.supported) throw new Error(`当前环境硬件不支持该编码档位: ${config.codec} (${exportW}x${exportH})`);

                const encoder = new VideoEncoder({
                    output: (chunk, meta) => muxer.addVideoChunk(chunk, meta),
                    error: (e) => { throw e; } 
                });
                encoder.configure(config);

                for (let i = 0; i <= totalFrames; i++) {
                    if (window._exportState.canceled) throw new Error("任务已被您主动终止。");
                    while (window._exportState.paused && !window._exportState.canceled) { await new Promise(r => setTimeout(r, 100)); }

                    const targetT = startSec + (i / fps);
                    drawFrame(ctx, exportW, exportH, targetT, snapP, snapS, null);

                    const frame = new VideoFrame(canvas, { timestamp: (i * 1000000) / fps });
                    encoder.encode(frame);
                    frame.close();

                    if (i % 5 === 0) {
                        const p = i / totalFrames;
                        els.expProgressBar.style.width = `${p * 100}%`;
                        const progressText = `${Math.round(p * 100)}% ( ${(i/fps).toFixed(1)}s / ${(totalFrames/fps).toFixed(1)}s )`;
                        els.expProgressText.innerText = progressText;
                        els.miniProgressText.innerText = progressText;
                    }
                    if (i % 10 === 0) await new Promise(r => setTimeout(r, 0));
                }
                
                await encoder.flush();
                muxer.finalize();

                const blob = new Blob([muxer.target.buffer], { type: isMp4 ? 'video/mp4' : 'video/webm' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a'); a.href = url;
                const ext = isMp4 ? 'mp4' : 'webm';
                a.download = `${String(snapP.title || 'export').replace(/[^a-z0-9_\-]+/gi, '_')}_纯视觉无声渲染.${ext}`; 
                a.click(); setTimeout(() => URL.revokeObjectURL(url), 2000);
                
                showExportAlert("✅ WebCodecs 无声视觉序列极速渲染完成，已自动触发下载！", 'success');
                els.expPauseResumeBtn.style.display = 'none';
                els.expCancelBtn.innerText = '完成并关闭';
                window._exportState.active = false;
                els.miniExportWidget.classList.add('hidden');
            }
        
        } catch(err) {
            console.error("渲染异常中断: ", err);
            showExportAlert("渲染中止: " + err.message, 'error');
            els.expPauseResumeBtn.style.display = 'none';
            els.expCancelBtn.innerText = '关闭面板';
            window._exportState.active = false;
            els.miniExportWidget.classList.add('hidden');
            if (window._exportState.renderTimer) clearInterval(window._exportState.renderTimer);
            pause();
        } 
    };

    els.expPauseResumeBtn.onclick = () => {
        window._exportState.paused = !window._exportState.paused;
        els.expPauseResumeBtn.innerText = window._exportState.paused ? '▶ 继续渲染' : '⏸ 暂停渲染';
    };
    
    els.expCancelBtn.onclick = () => {
        if (!window._exportState.active) {
            els.exportModal.classList.add('hidden');
            return;
        }
        if (els.expCancelBtn.innerText.includes('彻底放弃') || els.expCancelBtn.innerText.includes('中止录制')) {
            els.expCancelBtn.innerText = '⚠️ 再次点击确认终止';
            setTimeout(() => {
                if (window._exportState.active && els.expCancelBtn.innerText === '⚠️ 再次点击确认终止') {
                    els.expCancelBtn.innerText = '⏹ 彻底放弃任务';
                }
            }, 3000);
        } else {
            window._exportState.canceled = true;
            window._exportState.isRealtime = false;
            window._exportState.realtimeCanvas = null;
            window._exportState.realtimeCtx = null;
        }
    };

    if(els.playPauseBtn) els.playPauseBtn.onclick = togglePlay;
    if(els.stopBtn) els.stopBtn.onclick = () => { pause(); setT(0); };
    
    if(els.audioFileInput) els.audioFileInput.onchange = async(e) => {
      const file = e.target.files?.[0]; if(!file) return; els.audioEl.src = URL.createObjectURL(file);
      setStatus(els.xmlStatus, `✅ 已加载外部伴奏音频。`, 'good');
      const ctx = new (window.AudioContext || window.webkitAudioContext)(); 
      const decodedBuffer = await ctx.decodeAudioData(await file.arrayBuffer());
      state.audioBuffer = decodedBuffer; 
      state.waveform = computeWaveform(decodedBuffer, 800); 
      renderWaveform();
    };
    
    if(els.seekRange) {
      els.seekRange.onmousedown = () => state.isDraggingSlider = true; els.seekRange.onmouseup = () => state.isDraggingSlider = false;
      els.seekRange.addEventListener('touchstart', () => state.isDraggingSlider = true, {passive:true}); els.seekRange.addEventListener('touchend', () => state.isDraggingSlider = false, {passive:true});
      els.seekRange.oninput = () => setT((Number(els.seekRange.value)/1000)*endT(state.project));
    }
    
    if(els.audioEl) { els.audioEl.ontimeupdate = () => { draw(); renderWaveform(); syncUI(); }; els.audioEl.onended = () => { pause(); }; }
    
    if(els.waveCanvas) els.waveCanvas.onclick = (e) => { const r=els.waveCanvas.getBoundingClientRect(); setT((e.clientX-r.left)/r.width*endT(state.project)); };
    if(els.addAnchorFromCurrentBtn) els.addAnchorFromCurrentBtn.onclick = () => { els.anchorTimeInput.value = curT().toFixed(2); els.addAnchorManualBtn.onclick(); };
    if(els.addAnchorManualBtn) els.addAnchorManualBtn.onclick = () => {
      const b=Number(els.anchorBeatInput.value), t=Number(els.anchorTimeInput.value); if(!Number.isFinite(b)||!Number.isFinite(t)) return;
      const idx=state.project.anchors.findIndex(a=>Math.abs(a.beat-b)<0.001); if(idx>=0) state.project.anchors[idx].timeSec=t; else state.project.anchors.push({beat:b,timeSec:t});
      applyForm();
    };
    if(els.clearAnchorsBtn) els.clearAnchorsBtn.onclick = () => { state.project.anchors=[{beat:0,timeSec:state.project.timing.leadInSec}]; applyForm(); };

    if(els.previewCanvas) {
      els.previewCanvas.addEventListener('click', (e) => {
        const rect = els.previewCanvas.getBoundingClientRect();
        const clickX = e.clientX - rect.left;
        const clickY = e.clientY - rect.top;
        
        const isHoriz = state.project.display.aspectRatio === '4/3';
        const LOGIC_W = 720; const LOGIC_H = isHoriz ? 540 : 1280;
        
        const scaleX = LOGIC_W / rect.width;
        const scaleY = LOGIC_H / rect.height;
        const logX = clickX * scaleX;
        const logY = clickY * scaleY;
        
        const p = state.project;
        const timeSec = curT();
        const pps = 180 * (p.display.barScale||1);
        
        const m = getLayoutMetrics(LOGIC_W, LOGIC_H, p, state.skin);
        const { left, lw, pad, blowLip, drawLip } = m;
        
        let hitEventId = null;
        
        for (let i = p.score.length - 1; i >= 0; i--) {
            const ev = p.score[i];
            const s = beatToSec(ev.startBeat, p);
            const eT = beatToSec(ev.startBeat + ev.durationBeats, p);
            const evH = Math.max(12, (eT - s) * pps);
            
            let top, bot;
            if (ev.dir === 'blow') {
                bot = blowLip - (s - timeSec) * pps; 
                top = bot - evH;
            } else {
                top = drawLip + (s - timeSec) * pps; 
                bot = top + evH;
            }
            
            if (logY >= top && logY <= bot) {
                for (const hole of ev.holes) {
                    const nx = left + (hole - 1) * (lw + pad) + lw * 0.06;
                    const nw = lw * 0.88;
                    if (logX >= nx && logX <= nx + nw) {
                        hitEventId = ev.id;
                        break;
                    }
                }
            }
            if (hitEventId) break;
        }

        if (hitEventId) {
            if (state.selectedEventId !== hitEventId) {
                state.selectedEventId = hitEventId;
                const ev = p.score.find(e => e.id === hitEventId);
                if (els.anchorBeatInput) els.anchorBeatInput.value = ev.startBeat.toFixed(2);
                setT(beatToSec(ev.startBeat, state.project));
                renderEventList();
                draw();
                setTimeout(() => {
                    const row = document.getElementById('event-row-' + hitEventId);
                    if (row) row.scrollIntoView({behavior: 'smooth', block: 'center'});
                }, 50);
            } else {
                state.selectedEventId = null;
                renderEventList();
                draw();
            }
        }
      });
    }

    window.addEventListener('resize', () => { state.staticCached = false; draw(); renderWaveform(); });

    function init() { 
      const cached = loadFromLocal();
      if (cached && cached.project) { 
          state.project = normalizeProject(cached.project); 
          state.rawXmlNotes = cached.rawXmlNotes || null;
          state.correctedNotes = cached.correctedNotes || null;
          
          if(cached.skin) {
              state.skin.theme = cached.skin.theme || 'candy';
              state.skin.bgBlur = cached.skin.bgBlur || 0;
              state.skin.maskColor = cached.skin.maskColor || 'black';
              state.skin.maskOpacity = cached.skin.maskOpacity || 0;
              if(cached.skin.customOpts) state.skin.customOpts = {...state.skin.customOpts, ...cached.skin.customOpts};
              
              if(cached.skin.bgImageData) {
                  state.skin.bgImageData = cached.skin.bgImageData;
                  const img = new Image();
                  img.onload = () => { state.skin.bgImageObj = img; state.staticCached = false; draw(); };
                  img.src = state.skin.bgImageData;
              }
              if(cached.skin.customOpts && cached.skin.customOpts.harpImageData) {
                  const img = new Image();
                  img.onload = () => { state.skin.customOpts.harpImageObj = img; state.staticCached = false; draw(); };
                  img.src = cached.skin.customOpts.harpImageData;
              }
          }
          setStatus(document.getElementById('xmlStatus'), '✅ 已自动恢复上次的本地缓存工程（包含乐谱和设置）。'); 
      } else { 
          state.project = normalizeProject(makeEmptyProject()); 
      }
      
      syncThemeToLegend(); populateForm(); if(!state.raf) state.raf = requestAnimationFrame(tick); 

      function setupSpinner(inputId, decId, incId, step) {
          const input = document.getElementById(inputId);
          const dec = document.getElementById(decId);
          const inc = document.getElementById(incId);
          if(!input || !dec || !inc) return;
          const trigger = () => { input.dispatchEvent(new Event('input')); };
          dec.onclick = () => { input.value = Number(input.value) - step; trigger(); };
          inc.onclick = () => { input.value = Number(input.value) + step; trigger(); };
      }
      setupSpinner('laneWidthScaleInput', 'cwDec', 'cwInc', 0.001); 
      setupSpinner('blockDutyCycleInput', 'cdDec', 'cdInc', 0.01);
      setupSpinner('hitPosBlowInput', 'cbDec', 'cbInc', 1);
      setupSpinner('hitPosDrawInput', 'cdrawDec', 'cdrawInc', 1);
      setupSpinner('lanePanOffsetInput', 'cpanDec', 'cpanInc', 1);
    }
    init();
  </script>
</body>
</html>
