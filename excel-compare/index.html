<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Excel 结构化差异比对工具</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- SheetJS for Excel processing -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background-color: #f3f4f6; }
        .table-container { max-height: calc(100vh - 420px); overflow: auto; }
        th { position: sticky; top: 0; z-index: 20; background-color: #f9fafb; box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05); }
        
        /* 状态行颜色控制 */
        .row-added { background-color: #ecfdf5; }
        .row-removed { background-color: #fef2f2; }
        .row-modified { background-color: #fefce8; }
        
        /* 单元格级别高亮 */
        .cell-modified { background-color: #fef08a !important; }
        
        /* 冻结前两列 */
        .sticky-col-1 { position: sticky; left: 0; z-index: 10; background-color: inherit; border-right: 1px solid #e5e7eb; }
        .sticky-col-2 { position: sticky; left: 80px; z-index: 10; background-color: inherit; border-right: 1px solid #e5e7eb; box-shadow: 2px 0 5px -2px rgba(0,0,0,0.1); }
        th.sticky-col-1, th.sticky-col-2 { z-index: 30; background-color: #f9fafb; }

        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
        
        /* 自定义多选下拉框的滚动条 */
        .dropdown-scroll::-webkit-scrollbar { width: 6px; }
        .dropdown-scroll::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // Icons
        const UploadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
        const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
        const AlertIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="8" x2="12" y2="12"></line><line x1="12" y1="16" x2="12.01" y2="16"></line></svg>;
        const EyeOffIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"></path><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"></path><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"></path><line x1="2" y1="2" x2="22" y2="22"></line></svg>;
        const InfoIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>;
        const ChevronDownIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>;

        function App() {
            const [fileA, setFileA] = useState({ name: '', data: [], raw: null, sheets: [], selectedSheet: '' });
            const [fileB, setFileB] = useState({ name: '', data: [], raw: null, sheets: [], selectedSheet: '' });
            const [headers, setHeaders] = useState([]);
            
            // 多列联合主键状态
            const [selectedKeys, setSelectedKeys] = useState([]);
            const [isDropdownOpen, setIsDropdownOpen] = useState(false);
            const dropdownRef = useRef(null);

            const [diffResult, setDiffResult] = useState([]);
            const [filter, setFilter] = useState('ALL_CHANGES'); 
            const [isProcessing, setIsProcessing] = useState(false);
            const [hideUnchangedCols, setHideUnchangedCols] = useState(false);
            const [duplicateWarning, setDuplicateWarning] = useState("");

            // 处理点击外部关闭下拉框
            useEffect(() => {
                function handleClickOutside(event) {
                    if (dropdownRef.current && !dropdownRef.current.contains(event.target)) {
                        setIsDropdownOpen(false);
                    }
                }
                document.addEventListener("mousedown", handleClickOutside);
                return () => document.removeEventListener("mousedown", handleClickOutside);
            }, []);

            // 读取 Excel/CSV 文件
            const handleFileUpload = (e, fileType) => {
                const file = e.target.files[0];
                if (!file) return;

                setIsProcessing(true);
                const reader = new FileReader();
                reader.onload = (evt) => {
                    const bstr = evt.target.result;
                    const wb = XLSX.read(bstr, { type: 'binary' });
                    const sheets = wb.SheetNames;
                    const selectedSheet = sheets[0];
                    const data = XLSX.utils.sheet_to_json(wb.Sheets[selectedSheet], { defval: "" }); 

                    if (fileType === 'A') {
                        setFileA({ name: file.name, data: data, raw: wb, sheets: sheets, selectedSheet: selectedSheet });
                    } else {
                        setFileB({ name: file.name, data: data, raw: wb, sheets: sheets, selectedSheet: selectedSheet });
                    }
                    
                    // 切换文件或Sheet时，表头大概率发生巨变。
                    // 必须强制清空选中的联合主键，防止“幽灵主键”导致逻辑崩溃。
                    setSelectedKeys([]);
                    setIsProcessing(false);
                };
                reader.readAsBinaryString(file);
            };

            // 处理 Sheet 工作表切换
            const handleSheetChange = (fileType, sheetName) => {
                setIsProcessing(true);
                setTimeout(() => {
                    if (fileType === 'A') {
                        const data = XLSX.utils.sheet_to_json(fileA.raw.Sheets[sheetName], { defval: "" });
                        setFileA(prev => ({ ...prev, data: data, selectedSheet: sheetName }));
                    } else {
                        const data = XLSX.utils.sheet_to_json(fileB.raw.Sheets[sheetName], { defval: "" });
                        setFileB(prev => ({ ...prev, data: data, selectedSheet: sheetName }));
                    }
                    // 强制安全重置
                    setSelectedKeys([]);
                    setIsProcessing(false);
                }, 50);
            };

            // 提取公共表头
            useEffect(() => {
                if (fileA.data.length > 0 || fileB.data.length > 0) {
                    const headA = fileA.data.length > 0 ? Object.keys(fileA.data[0]) : [];
                    const headB = fileB.data.length > 0 ? Object.keys(fileB.data[0]) : [];
                    setHeaders(Array.from(new Set([...headA, ...headB])));
                }
            }, [fileA.data, fileB.data]);

            // 切换主键选中状态
            const toggleKey = (key) => {
                setSelectedKeys(prev => 
                    prev.includes(key) ? prev.filter(k => k !== key) : [...prev, key]
                );
            };

            // 获取行的唯一标识字符串
            const getRowKeyString = (row, index) => {
                if (selectedKeys.length === 0) return `row_${index}`;
                return selectedKeys.map(k => String(row[k] || '').trim()).join(' | ');
            };

            // 核心比对逻辑
            useEffect(() => {
                if (fileA.data.length === 0 && fileB.data.length === 0) return;

                setIsProcessing(true);
                setTimeout(() => {
                    const result = [];
                    const mapA = new Map();
                    const mapB = new Map();
                    let hasDuplicate = false;
                    const duplicateExamples = new Set(); // 用于收集具体的重复证据

                    // 幽灵数据清洗：判断是否整行全空
                    const isGhostRow = (row) => headers.every(h => String(row[h] || '').trim() === '');
                    
                    // 主键合法性校验：如果选定的主键列全部为空，这种脏数据没有对比资格
                    const isEmptyPrimaryKey = (row) => selectedKeys.length > 0 && selectedKeys.every(k => String(row[k] || '').trim() === '');

                    // 构建索引与极度严苛的碰撞检测 (File A)
                    fileA.data.forEach((row, index) => {
                        if (isGhostRow(row) || isEmptyPrimaryKey(row)) return; // 抛弃幽灵行和主键缺失行
                        
                        const keyStr = getRowKeyString(row, index);
                        if (selectedKeys.length > 0 && mapA.has(keyStr)) {
                            hasDuplicate = true;
                            duplicateExamples.add(keyStr);
                        }
                        mapA.set(keyStr, { data: row, index });
                    });

                    // 构建索引与极度严苛的碰撞检测 (File B)
                    fileB.data.forEach((row, index) => {
                        if (isGhostRow(row) || isEmptyPrimaryKey(row)) return; // 抛弃幽灵行和主键缺失行
                        
                        const keyStr = getRowKeyString(row, index);
                        if (selectedKeys.length > 0 && mapB.has(keyStr)) {
                            hasDuplicate = true;
                            duplicateExamples.add(keyStr);
                        }
                        mapB.set(keyStr, { data: row, index });
                    });

                    // 触发重复键警告（带罪证输出）
                    if (hasDuplicate && selectedKeys.length > 0) {
                        const examples = Array.from(duplicateExamples).slice(0, 3).join(' 】，【 ');
                        setDuplicateWarning(`严苛警告：您的表格中仍存在主键重复的脏数据！底层已发现以下重复值被互相覆盖：【 ${examples} 】... 请去源 Excel 中按此值搜索并修补漏洞，否则对比结果将失真！`);
                    } else {
                        setDuplicateWarning("");
                    }

                    const allKeys = new Set([...mapA.keys(), ...mapB.keys()]);

                    allKeys.forEach(key => {
                        const rowA = mapA.get(key);
                        const rowB = mapB.get(key);

                        if (rowA && !rowB) {
                            result.push({ type: 'removed', key, dataA: rowA.data, dataB: null, changes: [] });
                        } else if (!rowA && rowB) {
                            result.push({ type: 'added', key, dataA: null, dataB: rowB.data, changes: [] });
                        } else {
                            const changes = [];
                            headers.forEach(h => {
                                const valA = String(rowA.data[h] || '').trim();
                                const valB = String(rowB.data[h] || '').trim();
                                if (valA !== valB) changes.push(h);
                            });

                            if (changes.length > 0) {
                                result.push({ type: 'modified', key, dataA: rowA.data, dataB: rowB.data, changes });
                            }
                        }
                    });

                    result.sort((a, b) => {
                        const idxA = a.dataA ? mapA.get(a.key).index : mapB.get(a.key).index + 100000;
                        const idxB = b.dataA ? mapA.get(b.key).index : mapB.get(b.key).index + 100000;
                        return idxA - idxB;
                    });

                    setDiffResult(result);
                    setIsProcessing(false);
                }, 100); 
            }, [fileA.data, fileB.data, selectedKeys, headers]);

            // 视图过滤器
            const filteredResult = useMemo(() => {
                if (filter === 'ALL_CHANGES') return diffResult;
                return diffResult.filter(r => r.type === filter.toLowerCase());
            }, [diffResult, filter]);

            // 智能列折叠逻辑：动态计算哪些列需要显示
            const displayHeaders = useMemo(() => {
                if (!hideUnchangedCols) return headers;
                
                const changedCols = new Set();
                filteredResult.forEach(row => {
                    if (row.type === 'modified') {
                        row.changes.forEach(c => changedCols.add(c));
                    }
                });
                
                // 仅保留发生过异动的列，以及用户选定为主键的列
                const finalHeaders = headers.filter(h => selectedKeys.includes(h) || changedCols.has(h));
                if (finalHeaders.length === 0 && headers.length > 0) return headers; 
                return finalHeaders;
            }, [headers, filteredResult, hideUnchangedCols, selectedKeys]);


            // 导出结果
            const handleExport = () => {
                if (diffResult.length === 0) return alert("没有可导出的数据");

                const exportData = [];
                diffResult.forEach(row => {
                    const baseRow = {
                        "对比状态": row.type === 'added' ? '新增' : row.type === 'removed' ? '删除' : '修改',
                        "联合主键标识": row.key,
                        "变更列详情": row.changes.join(', ')
                    };

                    if (row.type === 'removed') {
                        headers.forEach(h => baseRow[`[旧] ${h}`] = row.dataA[h] || '');
                        exportData.push(baseRow);
                    } else if (row.type === 'added') {
                        headers.forEach(h => baseRow[`[新] ${h}`] = row.dataB[h] || '');
                        exportData.push(baseRow);
                    } else if (row.type === 'modified') {
                        headers.forEach(h => {
                            if (row.changes.includes(h)) {
                                baseRow[`[旧] ${h}`] = row.dataA[h] || '';
                                baseRow[`[新] ${h}`] = row.dataB[h] || '';
                            } else {
                                baseRow[`${h}`] = row.dataB[h] || '';
                            }
                        });
                        exportData.push(baseRow);
                    }
                });

                const ws = XLSX.utils.json_to_sheet(exportData);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "差异对比结果");
                XLSX.writeFile(wb, "结构化差异报告.xlsx");
            };

            const stats = {
                added: diffResult.filter(r => r.type === 'added').length,
                removed: diffResult.filter(r => r.type === 'removed').length,
                modified: diffResult.filter(r => r.type === 'modified').length,
                total: diffResult.length
            };

            return (
                <div className="min-h-screen p-6 max-w-[100vw] overflow-x-hidden">
                    <header className="mb-4">
                        <h1 className="text-3xl font-bold text-gray-800 tracking-tight">结构化数据矩阵对比器 (多主键版)</h1>
                    </header>

                    {/* 面向小白的使用说明 */}
                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-5 mb-6 text-sm text-blue-900 shadow-sm">
                        <h3 className="font-bold text-base flex items-center mb-3"><InfoIcon /><span className="ml-2">新手必看：如何正确排查表格差异？</span></h3>
                        <ul className="space-y-2 pl-2">
                            <li className="flex items-start">
                                <span className="bg-blue-200 text-blue-800 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 mt-0.5 shrink-0">1</span>
                                <div><strong>导入对比文件：</strong>在下方分别导入基准版本（旧表A）和目标版本（新表B）。</div>
                            </li>
                            <li className="flex items-start">
                                <span className="bg-blue-200 text-blue-800 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 mt-0.5 shrink-0">2</span>
                                <div>
                                    <strong>建立对比锚点（选择主键）：</strong>这是最重要的一步！你必须告诉工具，用哪一列（或哪几列）来证明“这是同一条数据”。<br/>
                                    <span className="text-red-600 font-semibold mt-1 inline-block">❌ 严禁盲目比对：如果不选主键，工具会死板地逐行对比（第1行对第1行）。一旦有人在表中间插入了一行，后面的所有数据都会错位，全部被误判为大面积修改！</span><br/>
                                    <span className="text-green-700 font-medium inline-block mt-1">✅ 联合主键：你可以下拉勾选多列（例如 `SignalName` + `InterfaceName`），只要它们的组合能唯一代表这一行即可。</span>
                                </div>
                            </li>
                            <li className="flex items-start">
                                <span className="bg-blue-200 text-blue-800 rounded-full w-5 h-5 flex items-center justify-center font-bold text-xs mr-2 mt-0.5 shrink-0">3</span>
                                <div><strong>审查结果：</strong>工具会自动剔除完全相同的行。<span className="bg-green-100 px-1 rounded">绿色代表新版本新增</span>，<span className="bg-red-100 px-1 rounded">红色代表被删除</span>，<span className="bg-yellow-100 px-1 rounded">黄色代表发生修改</span>（单元格内会标注红旧绿新）。建议点击“收起无变化列”以专注查看核心差异。</div>
                            </li>
                        </ul>
                    </div>

                    {/* 控制面板 */}
                    <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 mb-4">
                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 items-end">
                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-gray-700">旧版本 (基准文件 A)</label>
                                <div className="relative">
                                    <input type="file" id="fileA" accept=".csv, .xlsx, .xls" onChange={(e) => handleFileUpload(e, 'A')} className="hidden" />
                                    <label htmlFor="fileA" className="flex items-center justify-center w-full px-4 py-2 bg-gray-50 border border-gray-300 border-dashed rounded-lg cursor-pointer hover:bg-gray-100 transition-colors">
                                        <UploadIcon />
                                        <span className="ml-2 text-sm text-gray-600 truncate">{fileA.name || '导入基准表格...'}</span>
                                    </label>
                                </div>
                                {fileA.sheets && fileA.sheets.length > 1 && (
                                    <select 
                                        value={fileA.selectedSheet}
                                        onChange={(e) => handleSheetChange('A', e.target.value)}
                                        className="w-full px-2 py-1.5 border border-blue-300 rounded-md text-xs focus:ring-blue-500 focus:border-blue-500 bg-blue-50 text-blue-800 font-medium transition-colors"
                                    >
                                        {fileA.sheets.map(s => <option key={s} value={s}>工作表: {s}</option>)}
                                    </select>
                                )}
                            </div>

                            <div className="space-y-2">
                                <label className="block text-sm font-semibold text-gray-700">新版本 (目标文件 B)</label>
                                <div className="relative">
                                    <input type="file" id="fileB" accept=".csv, .xlsx, .xls" onChange={(e) => handleFileUpload(e, 'B')} className="hidden" />
                                    <label htmlFor="fileB" className="flex items-center justify-center w-full px-4 py-2 bg-blue-50 border border-blue-300 border-dashed rounded-lg cursor-pointer hover:bg-blue-100 transition-colors">
                                        <UploadIcon />
                                        <span className="ml-2 text-sm text-blue-600 truncate">{fileB.name || '导入目标表格...'}</span>
                                    </label>
                                </div>
                                {fileB.sheets && fileB.sheets.length > 1 && (
                                    <select 
                                        value={fileB.selectedSheet}
                                        onChange={(e) => handleSheetChange('B', e.target.value)}
                                        className="w-full px-2 py-1.5 border border-blue-300 rounded-md text-xs focus:ring-blue-500 focus:border-blue-500 bg-blue-50 text-blue-800 font-medium transition-colors"
                                    >
                                        {fileB.sheets.map(s => <option key={s} value={s}>工作表: {s}</option>)}
                                    </select>
                                )}
                            </div>

                            {/* 多列联合主键选择器 */}
                            <div className="space-y-2 lg:col-span-2 relative" ref={dropdownRef}>
                                <label className="flex items-center text-sm font-semibold text-gray-700">
                                    业务比对主键 (支持多选联合)
                                    <span className="ml-2 text-blue-500 group relative cursor-help">
                                        <AlertIcon />
                                        <div className="absolute hidden group-hover:block bottom-full mb-2 left-0 w-80 p-3 bg-gray-800 text-white text-xs rounded shadow-lg z-50">
                                            核心逻辑：勾选能唯一代表一行的字段。如果单列有重复，请勾选多列组成“联合唯一键”。
                                        </div>
                                    </span>
                                </label>
                                
                                <div 
                                    onClick={() => setIsDropdownOpen(!isDropdownOpen)} 
                                    className={`w-full px-3 py-2 border rounded-lg text-sm cursor-pointer flex justify-between items-center transition-colors ${selectedKeys.length === 0 ? 'border-red-400 bg-red-50 text-red-700' : 'border-gray-300 bg-white hover:bg-gray-50'}`}
                                >
                                    <div className="truncate pr-4 flex-1">
                                        {selectedKeys.length === 0 ? (
                                            <span className="font-medium">⚠️ 强烈警告：未选主键 (目前将按行号盲目比对)</span>
                                        ) : (
                                            <span className="font-medium text-gray-800">已选联合键: {selectedKeys.join(' + ')}</span>
                                        )}
                                    </div>
                                    <ChevronDownIcon />
                                </div>

                                {isDropdownOpen && (
                                    <div className="absolute top-full left-0 mt-1 w-full bg-white border border-gray-200 rounded-lg shadow-xl z-50 max-h-60 overflow-y-auto dropdown-scroll py-2">
                                        {headers.length === 0 ? (
                                            <div className="px-4 py-3 text-sm text-gray-400 text-center">请先导入表格获取表头</div>
                                        ) : (
                                            <div className="px-2">
                                                <div className="text-xs text-gray-400 mb-2 px-2 border-b pb-2">请勾选能唯一标识一行的业务列（可多选）</div>
                                                {headers.map(h => (
                                                    <label key={h} className="flex items-center px-2 py-1.5 hover:bg-blue-50 rounded cursor-pointer group">
                                                        <input 
                                                            type="checkbox" 
                                                            checked={selectedKeys.includes(h)} 
                                                            onChange={() => toggleKey(h)}
                                                            className="w-4 h-4 text-blue-600 rounded border-gray-300 focus:ring-blue-500"
                                                        />
                                                        <span className="ml-3 text-sm text-gray-700 group-hover:text-blue-700 truncate">{h}</span>
                                                    </label>
                                                ))}
                                            </div>
                                        )}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>

                    {/* 重复主键警告横幅 */}
                    {duplicateWarning && (
                        <div className="mb-4 px-4 py-3 bg-amber-50 border-l-4 border-amber-500 text-amber-800 text-sm font-medium rounded shadow-sm flex items-start">
                            <AlertIcon className="mr-2 mt-0.5 shrink-0" />
                            <span>{duplicateWarning}</span>
                        </div>
                    )}

                    {/* 统计面板与操作区 */}
                    {diffResult.length > 0 && (
                        <div className="flex flex-col md:flex-row justify-between items-center mb-4 space-y-4 md:space-y-0">
                            <div className="flex space-x-2">
                                <button onClick={() => setFilter('ALL_CHANGES')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${filter === 'ALL_CHANGES' ? 'bg-gray-800 text-white' : 'bg-gray-200 text-gray-700 hover:bg-gray-300'}`}>全部异动 ({stats.total})</button>
                                <button onClick={() => setFilter('ADDED')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${filter === 'ADDED' ? 'bg-green-600 text-white' : 'bg-green-100 text-green-800 hover:bg-green-200'}`}>新增 ({stats.added})</button>
                                <button onClick={() => setFilter('MODIFIED')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${filter === 'MODIFIED' ? 'bg-yellow-500 text-white' : 'bg-yellow-100 text-yellow-800 hover:bg-yellow-200'}`}>修改 ({stats.modified})</button>
                                <button onClick={() => setFilter('REMOVED')} className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${filter === 'REMOVED' ? 'bg-red-600 text-white' : 'bg-red-100 text-red-800 hover:bg-red-200'}`}>删除 ({stats.removed})</button>
                                
                                <div className="border-l-2 border-gray-300 mx-2"></div>
                                
                                <button onClick={() => setHideUnchangedCols(!hideUnchangedCols)} className={`flex items-center px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${hideUnchangedCols ? 'bg-blue-600 text-white' : 'bg-white border border-gray-300 text-gray-700 hover:bg-gray-50'}`}>
                                    <EyeOffIcon />
                                    <span className="ml-2">{hideUnchangedCols ? '恢复显示冗余列' : '收起无变化列 (推荐)'}</span>
                                </button>
                            </div>
                            
                            <button onClick={handleExport} className="flex items-center px-5 py-2 bg-blue-600 text-white rounded-lg shadow hover:bg-blue-700 transition-colors">
                                <DownloadIcon />
                                <span className="ml-2 font-medium">导出差异报告</span>
                            </button>
                        </div>
                    )}

                    {/* 可视化比对表格 */}
                    {isProcessing ? (
                        <div className="flex justify-center items-center h-64 bg-white rounded-xl shadow-sm border border-gray-200">
                            <div className="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600"></div>
                        </div>
                    ) : (
                        diffResult.length > 0 && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 table-container">
                                <table className="min-w-full divide-y divide-gray-200 text-sm whitespace-nowrap">
                                    <thead className="bg-gray-50">
                                        <tr>
                                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider sticky-col-1 w-20">状态</th>
                                            <th className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider sticky-col-2 w-48">联合主键标识</th>
                                            {displayHeaders.map(h => (
                                                <th key={h} className="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider border-l border-gray-200">{h}</th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody className="divide-y divide-gray-200 bg-white">
                                        {filteredResult.map((row, idx) => {
                                            const isAdded = row.type === 'added';
                                            const isRemoved = row.type === 'removed';
                                            const isModified = row.type === 'modified';
                                            
                                            // 取基准数据：新增的取B，其他的优先取A
                                            const baseData = isAdded ? row.dataB : row.dataA;
                                            const rowClass = isAdded ? 'row-added' : isRemoved ? 'row-removed' : isModified ? 'row-modified' : '';

                                            return (
                                                <tr key={idx} className={`hover:bg-gray-50 ${rowClass}`}>
                                                    <td className={`px-4 py-2 font-bold sticky-col-1 ${isAdded ? 'text-green-700' : isRemoved ? 'text-red-700' : isModified ? 'text-yellow-700' : 'text-gray-500'}`}>
                                                        {isAdded && '+ 新增'}
                                                        {isRemoved && '- 删除'}
                                                        {isModified && '~ 修改'}
                                                    </td>
                                                    <td className="px-4 py-2 text-gray-600 font-mono text-xs sticky-col-2 truncate max-w-xs" title={row.key}>
                                                        {row.key}
                                                    </td>
                                                    {displayHeaders.map(h => {
                                                        // 仅在修改行且当前列发生变化时，显示双重高亮对比
                                                        if (isModified && row.changes.includes(h)) {
                                                            return (
                                                                <td key={h} className="px-4 py-2 border-l border-gray-300 cell-modified">
                                                                    <div className="flex flex-col text-xs space-y-1">
                                                                        <span className="line-through text-red-600 opacity-80" title="基准旧值">[-] {row.dataA[h] || '空'}</span>
                                                                        <span className="text-green-700 font-bold" title="目标新值">[+] {row.dataB[h] || '空'}</span>
                                                                    </div>
                                                                </td>
                                                            );
                                                        }
                                                        
                                                        // 正常展示增/删/或未修改的列
                                                        return (
                                                            <td key={h} className={`px-4 py-2 border-l border-gray-200 ${isRemoved ? 'text-red-500 opacity-70' : isAdded ? 'text-green-700' : 'text-gray-800'}`}>
                                                                {baseData[h] !== undefined && baseData[h] !== '' ? baseData[h] : <span className="text-gray-300">-</span>}
                                                            </td>
                                                        );
                                                    })}
                                                </tr>
                                            );
                                        })}
                                        {filteredResult.length === 0 && (
                                            <tr>
                                                <td colSpan={displayHeaders.length + 2} className="px-6 py-10 text-center text-gray-500">
                                                    在这个过滤器下没有找到任何记录。
                                                </td>
                                            </tr>
                                        )}
                                    </tbody>
                                </table>
                            </div>
                        )
                    )}

                    {diffResult.length === 0 && !isProcessing && (
                        <div className="flex flex-col items-center justify-center h-64 bg-gray-50 rounded-xl border-2 border-dashed border-gray-300 text-gray-400">
                            <UploadIcon />
                            <p className="mt-4 font-medium">请导入文件，并务必选择正确的「业务比对主键」</p>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
